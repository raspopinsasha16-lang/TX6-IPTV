<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Халявщик | Кинотеатр & IPTV (ТВ-версия)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            padding: 20px 10px;
            text-align: center;
            min-height: 100vh;
        }
        .header-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 20px auto;
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin: 0; font-size: 28px; }
        
        .refresh-btn {
            background: #555;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 15px; }
        
        .player-buttons { display: flex; gap: 10px; margin-bottom: 5px; }
        .tv-quick-btn { background: #248a3d; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; white-space: nowrap; box-sizing: border-box; border: 2px solid transparent; }
        .settings-toggle-btn { background: #444; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 40%; font-size: 15px; box-sizing: border-box; border: 2px solid transparent; }
        
        /* Блок настроек */
        .settings-box { 
            display: none; 
            background: rgba(35, 35, 35, 0.95); 
            border: 2px solid #555; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 15px; 
            text-align: left;
        }
        .settings-box h3 { margin-top: 0; color: #00bcd4; font-size: 16px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .input-group input[type="text"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #666; background: #111; color: #fff; box-sizing: border-box; font-size: 14px; }
        
        /* Кнопка выбора локального файла */
        .file-select-label {
            display: inline-block;
            background: #e50914;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            border: 2px solid transparent;
        }
        
        .save-btn { background: #00bcd4; color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; border: 2px solid transparent; }

        #status { font-size: 14px; color: #00bcd4; margin: 12px 0; font-weight: bold; }

        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .channel-btn { background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; box-sizing: border-box; border: 2px solid transparent; }
        .channel-btn:hover { background: #e50914; border-color: #e50914; }

        .back-btn { display: inline-block; color: #aaa; text-decoration: none; font-size: 14px; margin-top: 20px; font-weight: bold; border: 2px solid transparent; padding: 5px 10px; border-radius: 6px; }
        .back-btn:hover { color: #fff; }

        /* СТИЛИ ДЛЯ ПУЛЬТА */
        .focusable { outline: none; transition: all 0.1s ease-in-out; }
        .focusable:focus {
            transform: scale(1.01);
            border: 2px solid #e50914 !important;
            box-shadow: 0 0 10px #e50914 !important;
            background: #e50914 !important;
            color: #fff !important;
        }
        .input-group input[type="text"]:focus {
            border: 2px solid #00bcd4 !important;
            background: #222;
        }
    </style>
</head>
<body>

    <audio id="clickSound" src="click.mp3" preload="auto"></audio>

    <div class="container">
        <div class="header-zone">
            <h1>🎬 Кинотеатр & IPTV</h1>
            <button class="refresh-btn focusable" id="refreshAppBtn" tabindex="0" onclick="hardRefresh()">🔄 Обновить</button>
        </div>

        <div class="player-box">
            <div class="player-buttons">
                <button class="tv-quick-btn focusable" id="startTvBtn" tabindex="0" onclick="loadIPTVPlaylist(getDefaultPlaylist())">📺 Моё ТВ</button>
                <button class="settings-toggle-btn focusable" id="toggleSettingsBtn" tabindex="0" onclick="toggleSettings()">⚙️ Настройки</button>
            </div>

            <div class="settings-box" id="settingsBox">
                <h3>Добавить онлайн ссылки:</h3>
                <div class="input-group">
                    <label for="customPlaylistUrl">Ссылка на IPTV плейлист (.m3u8):</label>
                    <input type="text" id="customPlaylistUrl" class="focusable" tabindex="0" placeholder="http://example.com/playlist.m3u8">
                </div>
                <div class="input-group">
                    <label for="customVideoUrl">Ссылка на сетевой MP4 фильм:</label>
                    <input type="text" id="customVideoUrl" class="focusable" tabindex="0" placeholder="http://example.com/movie.mp4">
                </div>
                
                <h3 style="margin-top:15px; color:#e50914;">Открыть из памяти приставки/телефона:</h3>
                <div class="input-group">
                    <input type="file" id="localVideoFile" accept="video/*" style="display:none;" onchange="handleLocalFile(this)">
                    <label for="localVideoFile" class="file-select-label focusable" id="fileSelectLabel" tabindex="0" onclick="document.getElementById('localVideoFile').click()">📂 Выбрать видеофайл</label>
                </div>

                <button class="save-btn focusable" id="saveSettingsBtn" tabindex="0" onclick="saveCustomSettings()">💾 Сохранить и применить</button>
            </div>

            <div id="status">Запустите телевидение</div>
            <div class="tv-channels-grid" id="channelsGrid"></div>
        </div>

        <a href="index.html" class="back-btn focusable" tabindex="0" onclick="playSound()">← На главную страницу</a>
    </div>

    <script>
        function playSound() { 
            var audio = document.getElementById('clickSound');
            if(audio) {
                audio.currentTime = 0;
                audio.play().catch(function(e){}); 
            }
        }

        function hardRefresh() {
            playSound();
            var status = document.getElementById('status');
            status.innerHTML = '🔄 Сбрасываем кэш...';
            setTimeout(function() {
                window.location.href = window.location.pathname + '?t=' + new Date().getTime();
            }, 300);
        }

        function getDefaultPlaylist() {
            var saved = localStorage.getItem('custom_playlist_url');
            return saved ? saved : 'http://sachamaster.pp.ua/2020/2020399.m3u8';
        }

        function toggleSettings() {
            playSound();
            var box = document.getElementById('settingsBox');
            if (box.style.display === 'block') {
                box.style.display = 'none';
                document.getElementById('startTvBtn').focus();
            } else {
                box.style.display = 'block';
                document.getElementById('customPlaylistUrl').value = localStorage.getItem('custom_playlist_url') || '';
                document.getElementById('customVideoUrl').value = localStorage.getItem('custom_video_url') || '';
                document.getElementById('customPlaylistUrl').focus();
            }
        }

        // Обработка выбранного из памяти файла
        function handleLocalFile(input) {
            if (input.files && input.files[0]) {
                var file = input.files[0];
                // Создаем временную внутреннюю ссылку на этот файл в памяти устройства
                var objectUrl = URL.createObjectURL(file);
                
                // Сохраняем имя и временный путь в localStorage, чтобы вывести кнопку на экран
                localStorage.setItem('local_video_name', file.name);
                localStorage.setItem('local_video_blob', objectUrl);
                
                var status = document.getElementById('status');
                status.innerHTML = '✅ Выбран локальный файл: ' + file.name;
            }
        }

        function saveCustomSettings() {
            playSound();
            var playlistUrl = document.getElementById('customPlaylistUrl').value.trim();
            var videoUrl = document.getElementById('customVideoUrl').value.trim();

            if (playlistUrl) localStorage.setItem('custom_playlist_url', playlistUrl);
            else localStorage.removeItem('custom_playlist_url');

            if (videoUrl) localStorage.setItem('custom_video_url', videoUrl);
            else localStorage.removeItem('custom_video_url');

            document.getElementById('settingsBox').style.display = 'none';
            buildChannelsGrid();
        }

        var menuProxy = 'https://proxy.cors.sh/';

        function loadIPTVPlaylist(playlistUrl) {
            playSound();
            var status = document.getElementById('status');
            var grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            status.innerHTML = '⌛ Загрузка списка...';

            fetch(menuProxy + playlistUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Ошибка сети');
                    return response.text())
                .then(data => { parseAndBuildList(data, playlistUrl); })
                .catch(() => {
                    fetch(playlistUrl)
                        .then(r => r.text())
                        .then(directData => { parseAndBuildList(directData, playlistUrl); })
                        .catch(() => {
                            status.innerHTML = '❌ Ошибка загрузки плейлиста.';
                            buildChannelsGrid();
                        });
                });
        }

        function parseAndBuildList(data, playlistUrl) {
            var status = document.getElementById('status');
            var grid = document.getElementById('channelsGrid');
            status.innerHTML = '📺 Список обновлен. Выберите канал:';
            
            // Выводим кастомные элементы наверх
            appendCustomButtons(grid);

            var lines = data.split('\n');
            var currentName = "";
            var count = 0;

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    var parts = line.split(',');
                    currentName = parts[parts.length - 1] || "Канал " + (++count);
                } 
                else if (line.length > 0 && !line.startsWith('#')) {
                    var streamUrl = line;
                    if (!streamUrl.startsWith('http') && playlistUrl.includes('sachamaster.pp.ua')) {
                        streamUrl = 'http://sachamaster.pp.ua/2020/' + streamUrl;
                    }
                    if (currentName) {
                        var btn = document.createElement('button');
                        btn.className = 'channel-btn focusable';
                        btn.setAttribute('tabindex', '0');
                        btn.innerText = currentName;
                        (function(url, name) {
                            btn.onclick = function() { startStream(url, name); };
                        })(streamUrl, currentName);
                        grid.appendChild(btn);
                    }
                }
            });

            setTimeout(() => {
                const firstChan = grid.querySelector('.focusable');
                if(firstChan) firstChan.focus();
            }, 100);
        }

        function appendCustomButtons(grid) {
            // 1. Сетевой MP4
            var savedVideo = localStorage.getItem('custom_video_url');
            if (savedVideo) {
                var vipBtn = document.createElement('button');
                vipBtn.className = 'channel-btn focusable';
                vipBtn.setAttribute('tabindex', '0');
                vipBtn.style.background = '#00bcd4';
                vipBtn.style.color = '#000';
                vipBtn.innerText = '🎥 Сетевое видео (MP4)';
                vipBtn.onclick = function() { startStream(savedVideo, "Сетевое видео"); };
                grid.appendChild(vipBtn);
            }

            // 2. Локальный файл из памяти приставки
            var localName = localStorage.getItem('local_video_name');
            var localBlob = localStorage.getItem('local_video_blob');
            if (localBlob) {
                var localBtn = document.createElement('button');
                localBtn.className = 'channel-btn focusable';
                localBtn.setAttribute('tabindex', '0');
                localBtn.style.background = '#e50914';
                localBtn.style.color = '#fff';
                localBtn.innerText = '📁 Из памяти: ' + (localName.length > 20 ? localName.substring(0,18)+'...' : localName);
                localBtn.onclick = function() { startStream(localBlob, localName); };
                grid.appendChild(localBtn);
            }
        }

        function buildChannelsGrid() {
            var grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            appendCustomButtons(grid);
            document.getElementById('startTvBtn').focus();
        }

        function startStream(streamUrl, channelName) {
            playSound();
            var status = document.getElementById('status');
            status.innerHTML = '🎬 Выбираем плеер для: ' + channelName + '...';
            
            var intentUrl = "intent://" + streamUrl.replace(/^https?:\/\//, "").replace(/^blob:https?:\/\//, "") + 
                            "#Intent;" +
                            "scheme=" + (streamUrl.startsWith("blob") ? "content" : (streamUrl.startsWith("https") ? "https" : "http")) + ";" +
                            "action=android.intent.action.VIEW;" +
                            "type=video/*;" + 
                            "end";
            
            var hiddenLink = document.createElement('a');
            hiddenLink.href = intentUrl;
            hiddenLink.style.display = 'none';
            document.body.appendChild(hiddenLink);
            hiddenLink.click();
            document.body.removeChild(hiddenLink);
        }

        // НАВИГАЦИЯ ДЛЯ ПУЛЬТА
        document.addEventListener('keydown', function(e) {
            var focusables = Array.from(document.querySelectorAll('.focusable'));
            focusables = focusables.filter(el => el.offsetWidth > 0 || el.offsetHeight > 0);
            
            var current = document.activeElement;
            var index = focusables.indexOf(current);
            if (index === -1) return;

            if (e.key === 'ArrowDown' || e.keyCode === 40) {
                e.preventDefault();
                var nextIndex = index;
                if (current.id === 'refreshAppBtn') {
                    nextIndex = focusables.findIndex(el => el.id === 'startTvBtn');
                } else if (current.id === 'startTvBtn' || current.id === 'toggleSettingsBtn') {
                    var box = document.getElementById('settingsBox');
                    if (box.style.display === 'block') {
                        nextIndex = focusables.findIndex(el => el.id === 'customPlaylistUrl');
                    } else {
                        var channels = document.querySelectorAll('.channel-btn');
                        if(channels.length > 0) channels[0].focus();
                        else document.querySelector('.back-btn').focus();
                        return;
                    }
                } else {
                    if (current.classList.contains('channel-btn')) {
                        nextIndex = index + 2 < focusables.length ? index + 2 : index;
                    } else {
                        nextIndex = index + 1 < focusables.length ? index + 1 : index;
                    }
                }
                if(focusables[nextIndex]) focusables[nextIndex].focus();
            }
            else if (e.key === 'ArrowUp' || e.keyCode === 38) {
                e.preventDefault();
                var prevIndex = index;
                if (current.classList.contains('channel-btn')) {
                    var grid = document.getElementById('channelsGrid');
                    var chanIndex = Array.from(grid.children).indexOf(current);
                    if (chanIndex < 2) {
                        document.getElementById('startTvBtn').focus();
                        return;
                    } else {
                        prevIndex = index - 2;
                    }
                } else if (current.id === 'startTvBtn' || current.id === 'toggleSettingsBtn') {
                    document.getElementById('refreshAppBtn').focus();
                    return;
                } else if (current.id === 'customPlaylistUrl') {
                    document.getElementById('toggleSettingsBtn').focus();
                    return;
                } else {
                    prevIndex = index - 1 >= 0 ? index - 1 : 0;
                }
                if(focusables[prevIndex]) focusables[prevIndex].focus();
            }
            else if (e.key === 'ArrowRight' || e.keyCode === 39) {
                if (current.tagName === 'INPUT') return;
                e.preventDefault();
                var rightIndex = index + 1 < focusables.length ? index + 1 : index;
                if(focusables[rightIndex]) focusables[rightIndex].focus();
            }
            else if (e.key === 'ArrowLeft' || e.keyCode === 37) {
                if (current.tagName === 'INPUT') return;
                e.preventDefault();
                var leftIndex = index - 1 >= 0 ? index - 1 : 0;
                if(focusables[leftIndex]) focusables[leftIndex].focus();
            }
            else if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                current.click();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('startTvBtn');
            if(startBtn) startBtn.focus();
            buildChannelsGrid();
        });
    </script>
</body>
</html>
